<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asha Chokshi — Artist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #F8F0E3;
      color: #3D2B1F;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    main {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .artist-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.15;
      color: #3D2B1F;
    }

    .tagline {
      margin-top: 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8B6E4E;
    }

    .divider {
      margin: 2rem auto;
      width: 60px;
      height: 2px;
      background-color: #C47A45;
      border: none;
    }

    .artwork-placeholder {
      margin: 0 auto 2.2rem;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4 / 3;
      background-color: #E8D5B7;
      border: 1.5px solid #C47A45;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .artwork-placeholder::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(196, 122, 69, 0.25);
    }

    .artwork-placeholder span {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: #8B6E4E;
      letter-spacing: 0.04em;
    }

    .coming-soon {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #3D2B1F;
    }

    .blurb {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      font-weight: 300;
      color: #8B6E4E;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .managed-by {
      margin-top: 1.8rem;
      font-size: 0.82rem;
      font-weight: 300;
      color: #8B6E4E;
      letter-spacing: 0.04em;
    }

    .contact {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      font-weight: 300;
      color: #8B6E4E;
      letter-spacing: 0.02em;
    }

    .contact a {
      font-size: 0.85rem;
      font-weight: 400;
      color: #C47A45;
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(196, 122, 69, 0.35);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .contact a:hover {
      border-color: #C47A45;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.75rem;
      font-weight: 300;
      color: #8B6E4E;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="artist-name">Asha Chokshi</h1>
    <p class="tagline">Artist &middot; Canvas Paintings &middot; Sketches</p>

    <hr class="divider" />

    <div class="artwork-placeholder">
      <span>Artwork coming soon</span>
    </div>

    <h2 class="coming-soon">Coming Soon</h2>
    <p class="blurb">A curated collection of original works.<br />Launching soon.</p>

    <p class="managed-by">This website is managed by her children.</p>

    <div class="contact">
      Please reach out at <a href="mailto:chokshibhakti13@gmail.com">chokshibhakti13@gmail.com</a>
    </div>
  </main>

  <footer>&copy; 2026 Asha Chokshi</footer>
</body>
</html>
